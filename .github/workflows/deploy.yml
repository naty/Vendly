name: Deploy a Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar estructura del proyecto
        run: |
          echo "Verificando archivos de VENDLY..."
          test -f index.html       && echo "OK index.html"
          test -f css/vendly.css   && echo "OK css/vendly.css"
          test -f js/app.js        && echo "OK js/app.js"
          test -f js/pages.js      && echo "OK js/pages.js"
          test -f js/actions.js    && echo "OK js/actions.js"
          echo "Estructura correcta. Vercel despliega automaticamente via GitHub integration."
