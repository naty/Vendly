<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VENDLY — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { font-family: 'Roboto', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1E2A38 0%, #0d1b2a 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: #fff; border-radius: 20px; padding: 0;
      width: 100%; max-width: 440px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(135deg, #1E2A38 0%, #0d1b2a 100%);
      padding: 32px 40px 28px;
      text-align: center;
    }
    .auth-logo { font-size: 2rem; font-weight: 900; line-height: 1; }
    .auth-logo span:first-child { color: #00BCD4; }
    .auth-logo span:last-child  { color: #FF6B00; }
    .auth-sub { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: 4px; }

    .auth-tabs {
      display: flex; border-bottom: 2px solid #f0f0f0;
    }
    .auth-tab {
      flex: 1; padding: 14px; text-align: center; cursor: pointer;
      font-size: 0.88rem; font-weight: 600; color: #6c757d;
      border: none; background: none; transition: all 0.2s;
    }
    .auth-tab.active { color: #00BCD4; border-bottom: 2px solid #00BCD4; margin-bottom: -2px; }
    .auth-tab:hover:not(.active) { background: #f8f9fa; color: #1E2A38; }

    .auth-body { padding: 28px 36px 32px; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-label { font-size: 0.82rem; font-weight: 600; color: #495057; margin-bottom: 4px; }
    .form-control {
      border-radius: 10px; padding: 10px 14px;
      border: 1.5px solid #e0e0e0; font-size: 0.88rem;
      transition: border-color 0.2s;
    }
    .form-control:focus { border-color: #00BCD4; box-shadow: 0 0 0 3px rgba(0,188,212,0.12); }
    .input-group .form-control { border-radius: 0 10px 10px 0; }
    .input-group-text { border-radius: 10px 0 0 10px; border: 1.5px solid #e0e0e0; background: #f8f9fa; }

    .btn-auth {
      width: 100%; padding: 12px;
      background: linear-gradient(90deg, #00BCD4, #0097a7);
      color: #fff; font-weight: 700; font-size: 0.95rem;
      border: none; border-radius: 10px;
      transition: opacity 0.2s; cursor: pointer;
    }
    .btn-auth:hover { opacity: 0.9; }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg { color: #DC3545; font-size: 0.82rem; min-height: 18px; margin-bottom: 8px; }
    .success-msg { color: #28A745; font-size: 0.85rem; text-align: center; padding: 10px; background: #d1fae5; border-radius: 8px; }

    .divider { text-align: center; margin: 18px 0; position: relative; }
    .divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:#e0e0e0; }
    .divider span { background:#fff; padding: 0 12px; font-size:0.78rem; color:#adb5bd; position:relative; }

    .optional-badge { font-size: 0.72rem; color: #adb5bd; font-weight: 400; margin-left: 4px; }

    .password-wrapper { position: relative; }
    .password-wrapper .form-control { padding-right: 42px; }
    .toggle-pass {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #adb5bd; cursor: pointer; font-size: 1rem;
    }
    .toggle-pass:hover { color: #495057; }

    .referral-hint { font-size: 0.76rem; color: #6c757d; margin-top: 4px; }

    .spinner-border-sm { width: 1rem; height: 1rem; }
  </style>
</head>
<body>

<div class="auth-card">
  <!-- Header -->
  <div class="auth-header">
    <div class="auth-logo"><span>Vend</span><span>ly</span></div>
    <div class="auth-sub">Sistema de Gestión Comercial</div>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLoginBtn" onclick="switchTab('login')">
      <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
    </button>
    <button class="auth-tab" id="tabRegisterBtn" onclick="switchTab('register')">
      <i class="bi bi-person-plus me-1"></i> Registrarse
    </button>
  </div>

  <div class="auth-body">

    <!-- ===== LOGIN FORM ===== -->
    <div class="auth-form active" id="formLogin">
      <p id="loginError" class="error-msg"></p>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="loginEmail" type="email" class="form-control" placeholder="tu@email.com"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="password-wrapper">
          <input id="loginPass" type="password" class="form-control" placeholder="••••••••"
                 onkeydown="if(event.key==='Enter') doLogin()">
          <button class="toggle-pass" type="button" onclick="togglePassword('loginPass', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button class="btn-auth" id="loginBtn" onclick="doLogin()">
        Ingresar
      </button>
    </div>

    <!-- ===== REGISTER FORM ===== -->
    <div class="auth-form" id="formRegister">
      <p id="registerError" class="error-msg"></p>
      <div id="registerSuccess" class="success-msg mb-3" style="display:none;"></div>

      <div class="mb-3">
        <label class="form-label">Nombre del negocio *</label>
        <input id="regName" class="form-control" placeholder="Ej: Tienda Don Pedro">
      </div>
      <div class="mb-3">
        <label class="form-label">Email *</label>
        <input id="regEmail" type="email" class="form-control" placeholder="tu@email.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña *</label>
        <div class="password-wrapper">
          <input id="regPass" type="password" class="form-control" placeholder="Mínimo 6 caracteres">
          <button class="toggle-pass" type="button" onclick="togglePassword('regPass', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar contraseña *</label>
        <div class="password-wrapper">
          <input id="regPassConfirm" type="password" class="form-control" placeholder="Repetí la contraseña">
          <button class="toggle-pass" type="button" onclick="togglePassword('regPassConfirm', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Teléfono <span class="optional-badge">(opcional)</span></label>
        <input id="regPhone" type="tel" class="form-control" placeholder="0981 000 000">
      </div>
      <div class="mb-4">
        <label class="form-label">Código de referido <span class="optional-badge">(opcional)</span></label>
        <input id="regRef" class="form-control" placeholder="Ej: VDL-TIEND1234" style="text-transform:uppercase;"
               oninput="this.value=this.value.toUpperCase()">
        <div class="referral-hint"><i class="bi bi-gift me-1"></i>Obtenés 10% de descuento en tu mensualidad</div>
      </div>

      <button class="btn-auth" id="registerBtn" onclick="doRegister()">
        <i class="bi bi-person-plus me-1"></i> Crear cuenta gratis
      </button>
    </div>

  </div><!-- /auth-body -->
</div><!-- /auth-card -->

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js"></script>
<script>
const ADMIN_EMAIL = 'corporativogestion2025@gmail.com';
const PRICE       = 250000;

// Check if already logged in
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session) redirect(session.user.email);
})();

function redirect(email) {
  window.location.href = email === ADMIN_EMAIL ? '/admin.html' : '/index.html';
}

function switchTab(tab) {
  document.getElementById('formLogin').classList.toggle('active', tab === 'login');
  document.getElementById('formRegister').classList.toggle('active', tab === 'register');
  document.getElementById('tabLoginBtn').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegisterBtn').classList.toggle('active', tab === 'register');
  document.getElementById('loginError').textContent = '';
  document.getElementById('registerError').textContent = '';
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const isPass = input.type === 'password';
  input.type = isPass ? 'text' : 'password';
  btn.querySelector('i').className = isPass ? 'bi bi-eye-slash' : 'bi bi-eye';
}

// ---- LOGIN ----
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('loginError');

  if (!email || !password) { errEl.textContent = 'Completá email y contraseña.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2 align-middle"></span>Ingresando...';
  errEl.textContent = '';

  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = 'Email o contraseña incorrectos.';
    btn.disabled = false;
    btn.innerHTML = 'Ingresar';
    return;
  }
  redirect(data.user.email);
}

// ---- REGISTER ----
function genCode(name) {
  const base = (name || '').replace(/[^a-zA-Z]/g, '').toUpperCase().substring(0, 5).padEnd(3, 'X');
  const num  = Math.floor(1000 + Math.random() * 9000);
  return 'VDL-' + base + num;
}

async function doRegister() {
  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const pass     = document.getElementById('regPass').value;
  const passConf = document.getElementById('regPassConfirm').value;
  const phone    = document.getElementById('regPhone').value.trim();
  const refCode  = document.getElementById('regRef').value.trim().toUpperCase();

  const btn   = document.getElementById('registerBtn');
  const errEl = document.getElementById('registerError');
  const okEl  = document.getElementById('registerSuccess');

  errEl.textContent = '';
  okEl.style.display = 'none';

  if (!name)  { errEl.textContent = 'El nombre del negocio es obligatorio.'; return; }
  if (!email) { errEl.textContent = 'El email es obligatorio.'; return; }
  if (pass.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'; return; }
  if (pass !== passConf) { errEl.textContent = 'Las contraseñas no coinciden.'; return; }

  // Validate referral code if provided
  let referrerSub = null;
  if (refCode) {
    const { data: refData } = await db.from('suscripciones').select('user_id, discount_percent').eq('referral_code', refCode).maybeSingle();
    if (!refData) { errEl.textContent = 'El código de referido no existe. Dejalo vacío o verificá el código.'; return; }
    referrerSub = refData;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2 align-middle"></span>Creando cuenta...';

  const { data, error } = await db.auth.signUp({
    email,
    password: pass,
    options: { data: { name } },
  });

  if (error) {
    errEl.textContent = error.message === 'User already registered'
      ? 'Este email ya tiene una cuenta. Iniciá sesión.'
      : 'Error al crear cuenta: ' + error.message;
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-person-plus me-1"></i> Crear cuenta gratis';
    return;
  }

  // If session returned immediately (email confirmation off), create subscription record
  if (data.session) {
    const userId    = data.user.id;
    const myCode    = genCode(name);
    const discount  = refCode && referrerSub ? 10 : 0;

    await db.from('suscripciones').insert({
      user_id:          userId,
      email:            email,
      name:             name,
      phone:            phone || null,
      status:           'pending',
      price:            PRICE,
      referral_code:    myCode,
      referred_by:      refCode || null,
      discount_percent: discount,
    });

    // Give referrer +10% (admin will validate — we just record it; admin panel shows it)
    // Referrer discount update is handled by admin to avoid RLS issues

    redirect(email);
  } else {
    // Email confirmation required
    okEl.textContent = '¡Cuenta creada! Revisá tu email para confirmar tu cuenta y luego iniciá sesión.';
    okEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-person-plus me-1"></i> Crear cuenta gratis';
  }
}
</script>

</body>
</html>
